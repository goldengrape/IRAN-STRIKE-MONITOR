name: Update Market Data Daily

on:
  schedule:
    # Run at 21:00 UTC (17:00 EST / 05:00 Beijing Time) daily
    - cron: '0 21 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Need permission to commit files to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data fetch script
        run: python fetch_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Only commit if data files have changed
          git add data/data.json data/history.json data/rss.xml

          # Use diff to check for changes to avoid failing the workflow when there are none
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update market data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
